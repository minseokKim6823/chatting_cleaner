server:
  port: 8080

spring:
  application:
    name: kakaotalk_chatting_rule
  config:
    import: optional:file:.env[.properties]

  # H2 Database
  datasource:
    url: jdbc:h2:mem:chatting_rule
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

# Kakao API
kakao:
  api:
    base-url: https://kapi.kakao.com
    admin-key: ${KAKAO_ADMIN_KEY:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
